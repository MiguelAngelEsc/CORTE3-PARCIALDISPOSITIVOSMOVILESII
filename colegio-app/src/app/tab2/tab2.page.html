<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Registrar Alumno</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Formulario nuevo alumno -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Nuevo Alumno</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="full">
        <ion-label position="stacked">Nombre del Alumno</ion-label>
        <ion-input [(ngModel)]="nombreAlumno" type="text" placeholder="Nombre completo" clearInput></ion-input>
      </ion-item>

      <ion-list-header class="ion-margin-top">
        <ion-label>Sección</ion-label>
      </ion-list-header>
      <ion-radio-group [(ngModel)]="seccionSeleccionada">
        <ion-item>
          <ion-radio slot="start" value="pre-escolar"></ion-radio>
          <ion-label>Pre-escolar</ion-label>
        </ion-item>
        <ion-item>
          <ion-radio slot="start" value="primaria"></ion-radio>
          <ion-label>Primaria</ion-label>
        </ion-item>
        <ion-item>
          <ion-radio slot="start" value="bachillerato"></ion-radio>
          <ion-label>Bachillerato</ion-label>
        </ion-item>
      </ion-radio-group>

      <ion-button expand="block" class="ion-margin-top" (click)="guardar()">
        <ion-icon slot="start" name="save-outline"></ion-icon>
        Guardar
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Lista de alumnos registrados -->
  <ion-list-header>
    <ion-label><strong>Alumnos Guardados</strong></ion-label>
  </ion-list-header>

  <ion-list>
    <ion-item *ngFor="let alumno of alumnos">
      <ion-label>
        <h2>{{ alumno.nombre }}</h2>
        <ion-badge [color]="getSeccionColor(alumno.seccion)">{{ getSeccionLabel(alumno.seccion) }}</ion-badge>
      </ion-label>
      <ion-button slot="end" fill="clear" color="danger" (click)="eliminar(alumno)">
        Eliminar
      </ion-button>
    </ion-item>
    <ion-item *ngIf="alumnos.length === 0">
      <ion-label color="medium">No hay alumnos registrados</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
