<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Registrar Pariente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="full">
    <ion-item>
      <ion-label position="stacked">Nombre</ion-label>
      <ion-input [(ngModel)]="nombre" type="text" placeholder="Nombre completo" clearInput></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Cédula</ion-label>
      <ion-input [(ngModel)]="cedula" type="tel" inputmode="numeric" placeholder="Número de cédula" clearInput></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Celular</ion-label>
      <ion-input [(ngModel)]="celular" type="tel" placeholder="Número de celular" clearInput></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Correo</ion-label>
      <ion-input [(ngModel)]="correo" type="email" placeholder="correo@ejemplo.com" clearInput></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input [(ngModel)]="password" type="password" placeholder="Mínimo 6 caracteres"></ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding-top">
    <ion-button expand="block" (click)="registrar()">Registrar</ion-button>
    <ion-button expand="block" fill="clear" class="ion-margin-top" (click)="goToLogin()">
      ¿Ya tienes cuenta? <strong>&nbsp;Ingresar</strong>
    </ion-button>
  </div>
</ion-content>
