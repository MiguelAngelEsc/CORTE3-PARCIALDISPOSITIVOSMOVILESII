<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Recoger Alumno</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="salir()" title="Salir">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-note class="ion-padding-bottom" style="display:block">
    <ion-icon name="person-circle-outline"></ion-icon>
    Bienvenido, <strong>{{ nombreUsuario }}</strong>
  </ion-note>

  <!-- Selección de carril -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Selecciona el carril</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-radio-group [(ngModel)]="carrilSeleccionado" [disabled]="yaLlego">
        <ion-item>
          <ion-radio slot="start" value="1"></ion-radio>
          <ion-label>Carril 1</ion-label>
        </ion-item>
        <ion-item>
          <ion-radio slot="start" value="2"></ion-radio>
          <ion-label>Carril 2</ion-label>
        </ion-item>
        <ion-item>
          <ion-radio slot="start" value="3"></ion-radio>
          <ion-label>Carril 3</ion-label>
        </ion-item>
      </ion-radio-group>
    </ion-card-content>
  </ion-card>

  <!-- Lista de alumnos -->
  <ion-card *ngIf="alumnos.length > 0">
    <ion-card-header>
      <ion-card-subtitle>Mis alumnos a recoger</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-chip *ngFor="let alumno of alumnos" [color]="getColorChip(alumno.seccion)">
        <ion-icon name="person-outline"></ion-icon>
        <ion-label>{{ alumno.nombre }}</ion-label>
      </ion-chip>
    </ion-card-content>
  </ion-card>

  <ion-note *ngIf="alumnos.length === 0" class="ion-padding" color="medium" style="display:block">
    No tienes alumnos registrados. Ve a la pestaña "Registrar Alumno".
  </ion-note>

  <!-- Botones -->
  <div class="ion-padding-top">
    <ion-button
      expand="block"
      color="success"
      (click)="llegue()"
      [disabled]="yaLlego || alumnos.length === 0">
      <ion-icon slot="start" name="location-outline"></ion-icon>
      Llegué
    </ion-button>

    <ion-button
      expand="block"
      color="warning"
      class="ion-margin-top"
      (click)="listo()"
      [disabled]="!yaLlego">
      <ion-icon slot="start" name="checkmark-circle-outline"></ion-icon>
      Listo
    </ion-button>
  </div>

  <!-- Estado -->
  <ion-card *ngIf="yaLlego" color="light" class="ion-margin-top">
    <ion-card-content>
      <div style="display:flex; align-items:center; gap:8px">
        <ion-icon name="checkmark-circle" color="success" style="font-size:24px"></ion-icon>
        <span>Llegada registrada en <strong>Carril {{ carrilSeleccionado }}</strong>. Espera al profesor.</span>
      </div>
    </ion-card-content>
  </ion-card>

</ion-content>
